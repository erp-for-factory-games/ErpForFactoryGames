name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write       # publish-unit-test-result-action needs this
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — OS-agnostic, single runner.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (dotnet format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize vendored SatisfactorySaveNet submodule
        run: git -c submodule.vendor/SatisfactorySaveNet.update=checkout submodule update --init --recursive

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ubuntu-latest-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ubuntu-latest-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Format check
        run: ./build.sh Format

  # ---------------------------------------------------------------------------
  # Build & Test — runs on Linux, Windows, macOS.
  # NUKE is the source of truth; YAML just orchestrates.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize vendored SatisfactorySaveNet submodule
        shell: bash
        run: git -c submodule.vendor/SatisfactorySaveNet.update=checkout submodule update --init --recursive

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ matrix.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: ${{ matrix.os }}-nuget-

      - name: Setup .NET (10 from global.json + 8 for vendor submodule)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Build & Test
        shell: bash
        run: ./build.sh Test

      - name: Upload TRX test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/*.trx
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Publish — aggregates TRX from every OS in the matrix into a single
  # check + PR comment so failures show up directly in the PR UI.
  # ---------------------------------------------------------------------------
  publish-test-results:
    name: Publish test results
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Download all TRX artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: test-results-*
          merge-multiple: false

      - name: Publish results to commit check
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        with:
          files: test-results/**/*.trx
          check_name: Test results
          comment_mode: changes in failures

  # ---------------------------------------------------------------------------
  # Release — auto-creates a GitHub release on every successful push to main.
  # Version is computed by Nerdbank.GitVersioning from version.json + git
  # height. Skipped on PR runs (only runs after a PR merges into main).
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [lint, build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: write    # create tags + releases

    steps:
      - name: Checkout (full history for NB.GV)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize vendored SatisfactorySaveNet submodule
        run: git -c submodule.vendor/SatisfactorySaveNet.update=checkout submodule update --init --recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./build.sh Release
